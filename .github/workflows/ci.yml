name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: simulator
          POSTGRES_PASSWORD: simulator
          POSTGRES_DB: messaging_sim
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U simulator -d messaging_sim"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go test ./...
        env:
          DATABASE_URL: postgres://simulator:simulator@localhost:5433/messaging_sim?sslmode=disable

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
        env:
          VITE_API_URL: /api
