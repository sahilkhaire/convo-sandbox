name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-backend:
    name: Deploy API (CapRover)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ vars.CAPROVER_APP_NAME }}
          token: ${{ secrets.CAPROVER_APP_TOKEN }}

  deploy-dashboard:
    name: Deploy dashboard (CapRover nginx)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use dashboard Dockerfile
        run: echo '{"schemaVersion":2,"dockerfilePath":"./web/Dockerfile"}' > captain-definition

      - name: Deploy dashboard to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ vars.CAPROVER_DASHBOARD_APP_NAME }}
          token: ${{ secrets.CAPROVER_DASHBOARD_TOKEN }}
