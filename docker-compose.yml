services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: simulator
      POSTGRES_PASSWORD: simulator
      POSTGRES_DB: messaging_sim
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simulator -d messaging_sim"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://simulator:simulator@postgres:5432/messaging_sim?sslmode=disable
      PORT: "8080"
      CORS_ORIGIN: http://localhost:3000
      ENABLE_DATA_RESET: "true"
      MEDIA_STORAGE_PATH: /data/media
    volumes:
      - media:/data/media
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  pgdata:
  media:
